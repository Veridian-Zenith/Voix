# Voix - The Arcane Runes (Configuration)
#
# GLOBAL SETTINGS:
# sanctuary - The default directory where commands are executed.
# path      - The search path for executables.
#
sanctuary /tmp
path /bin:/sbin:/usr/bin:/usr/sbin

#
# GRAMMAR:
# [ordain|shun] [trust] <ident> [mask <target>] [rite <command> [args ...]]
#
# RUNES:
# ordain  - Grant permission to ascend.
# shun    - Banish a soul/group from a specific rite.
# trust   - Allow ascension without a token of proof (password).
# mask    - The identity to assume during the rite (defaults to root).
# rite    - The specific incantation (command) being allowed.
#
# IDENTITIES:
# user    - A specific soul's username.
# :group  - An entire collective (prefixed with a colon).

# -- THE HIGH CIRCLE --
# Allow members of the wheel group to perform any rite with ritual trust.
ordain trust :wheel

# -- THE ARCHITECTS --
# Allow 'admin' to assume any mask without a token of proof.
# ordain trust admin

# -- RESTRICTED RITES --
# Allow 'initiate' to restart a service as root without a password.
# ordain trust initiate mask root rite /usr/bin/systemctl restart nginx

# -- THE BANISHED --
# Explicitly shun specific souls or groups from power.
# shun exiled
