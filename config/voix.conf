# Voix configuration

# Core system settings
core:
  sanctuary: /var/lib/voix
  paths:
    - /bin
    - /sbin
    - /usr/bin
    - /usr/sbin

  # Targets that receive the full "system" treatment: retained capabilities,
  # no seccomp, no file-descriptor scrubbing, and a fully preserved environment
  # (including loader/interpreter variables such as LD_* and PYTHON*). This is
  # required for package managers that drop to an unprivileged system account
  # and for AUR helpers that need the caller's environment.
  #
  # On Arch this is the pacman user; on other distributions set the equivalent
  # package-manager target here, e.g. `root` for apt/dnf running as root, or
  # `_apt` for Debian's split-uid helper. Leave it empty to disable the
  # unconfined path entirely (everything then defaults to `restricted`).
  unconfined_targets:
    - alpm

# Access Control List
acl:
  group:
    wheel:
      - action: permit
        options: [trust, keepenv]
  user:
    root:
      - action: permit
        options: [trust, keepenv]

# Security Policies
security:
  # Define named security profiles
  profiles:
    restricted:
      retain_full_capabilities: false
      enable_seccomp: true
      enable_resource_limits: true
      scrub_environment: true
    privileged:
      retain_full_capabilities: true
      enable_seccomp: false
      enable_resource_limits: false
      scrub_environment: false
      preserve_full_environment: false
  blocklist:
    - /bin/sh
    - /bin/bash
    - /bin/dash
    - /bin/zsh
    - /usr/bin/bash
    - /usr/bin/dash
    - /usr/bin/zsh
    - /usr/bin/env
