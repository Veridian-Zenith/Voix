# Voix Configuration File
#
# The syntax is as follows:
#   (permit|deny) [nopass] <ident> [as <target>] [cmd <command> [args ...]]
#
# - permit: Allow the user to execute a command.
# - deny: Prevent the user from executing a command.
# - nopass: The user will not be prompted for a password.
# - ident: The user or group to apply the rule to.
#          Groups must be prefixed with a colon (e.g., :wheel).
# - target: The user to execute the command as (defaults to root).
# - command: The command to be executed.
#            If no command is specified, any command is allowed.
# - args: A list of arguments for the command.

# Allow members of the wheel group to run any command
permit :wheel

# Allow user "admin" to run /usr/bin/systemctl as root without a password
permit nopass admin as root cmd /usr/bin/systemctl

# Deny user "guest" from running any commands
deny guest
