# Global settings
# sanctuary: Defines the base directory for temporary files created by Voix.
# path: A list of directories that Voix considers trusted for finding executables.
globals:
  sanctuary: /tmp
  path:
    - /bin
    - /sbin
    - /usr/bin
    - /usr/sbin

# Access control rules
# rules: A list of rules defining permissions for users/groups.
#   - action: 'permit' to allow or 'deny' to block the action.
#   - identity: The user (e.g., 'username') or group (e.g., ':groupname') the rule applies to.
#   - trust: If 'true', skips authentication (e.g., password prompt) for the matched action.
#   - command: (Optional) The specific executable path to match for this rule.
#   - args: (Optional) A list of command arguments that must match for this rule.
rules:
  # Allow members of the wheel group to perform any rite with ritual trust.
  - action: permit
    identity: :wheel
    trust: true
