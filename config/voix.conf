# Voix configuration

# Core system settings
core:
  sanctuary: /var/lib/voix
  paths:
    - /bin
    - /sbin
    - /usr/bin
    - /usr/sbin

  # Whether to default to login shell mode
  login_shell: false

  # Whether to suppress stderr log output
  suppress_stderr: true

  # Targets that receive the full "system" treatment: retained capabilities,
  # no seccomp, no file-descriptor scrubbing, and a fully preserved environment
  # (including loader/interpreter variables such as LD_* and PYTHON*). This is
  # required for package managers: pacman runs as `root` and must chown its
  # download directories (needs CAP_CHOWN), while `alpm` is its internal
  # unprivileged drop-user that also needs the full environment for AUR helpers.
  #
  # `root` is included by default so `voix pacman -Syu` works out of the box.
  # On other distributions set the equivalent package-manager target here
  # (e.g. `root` for apt/dnf, or `_apt` for Debian's split-uid helper). You can
  # remove `root` to confine generic root commands (then grant pacman
  # explicitly via a rule with `profile: privileged`).
  unconfined_targets:
    - root
    - alpm

# Access Control List
acl:
  group:
    wheel:
      - action: permit
        options: [trust, keepenv]
  user:
    root:
      - action: permit
        options: [trust, keepenv]

# Security Policies
security:
  # Define named security profiles
  profiles:
    restricted:
      retain_full_capabilities: false
      enable_seccomp: true
      enable_resource_limits: true
      scrub_environment: true
    privileged:
      retain_full_capabilities: true
      enable_seccomp: false
      enable_resource_limits: false
      scrub_environment: false
      preserve_full_environment: false
  blocklist:
    - /bin/sh
    - /bin/bash
    - /bin/dash
    - /bin/zsh
    - /usr/bin/bash
    - /usr/bin/dash
    - /usr/bin/zsh
    - /usr/bin/env
