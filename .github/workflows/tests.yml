name: Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies and LLVM 22
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libcap-dev libseccomp-dev libyaml-cpp-dev wget ninja-build ccache mold
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-22 lld-22

      - name: Configure CMake (Debug mode)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-22 \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DENABLE_PERMISSIONS=OFF

      - name: Build and Run Tests
        run: |
          cmake --build build
          cd build && ctest --output-on-failure
