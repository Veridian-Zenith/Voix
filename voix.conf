-- Voix Configuration - Ultra Simple Syntax

-- Basic access rules (one per line)
root allow nopass
group:wheel allow

-- Examples (commented out):
-- admin allow
-- group:developers allow
-- bob as:www-data allow

-- Settings
log: /var/log/voix.log
password: true
path: /bin:/sbin:/usr/bin:/usr/sbin:/usr/local/bin:/usr/local/sbin
